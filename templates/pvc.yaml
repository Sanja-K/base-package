{{- if .Values.pvc.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ .Values.pvc.name | default (include "base-package.fullname" .) }}
  labels:
    {{- include "base-package.labels" . | nindent 4 }}
spec:
  accessModes:
    - {{ .Values.pvc.accessMode | default "ReadWriteMany" }}
  storageClassName: {{ .Values.pvc.storageClass | quote }}
  resources:
    requests:
      storage: {{ .Values.pvc.size | default "10Gi" }}
{{- end }}
